name: model-orchestrator

# Build and push the AI Model Router image and its Streamlit admin UI to GHCR.
#
# Triggers:
#   - push to main when files under model-orchestrator/ (or this workflow) change
#   - manual workflow_dispatch (always builds)
#
# Images:
#   ghcr.io/knaeckebrothero/model-orchestrator
#   ghcr.io/knaeckebrothero/model-orchestrator-admin-ui
#
# Tags:
#   - sha-<short>   always
#   - latest        on push to main / dispatch from main

on:
  push:
    branches: [main]
    paths:
      - 'model-orchestrator/**'
      - '.github/workflows/model-orchestrator.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: knaeckebrothero/model-orchestrator
            context: ./model-orchestrator
            file: ./model-orchestrator/Dockerfile
          - image: knaeckebrothero/model-orchestrator-admin-ui
            context: ./model-orchestrator/admin_ui
            file: ./model-orchestrator/admin_ui/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image }},ignore-error=true
          cache-to: type=gha,mode=min,scope=${{ matrix.image }},ignore-error=true
