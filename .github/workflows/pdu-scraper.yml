name: pdu-scraper

# Build and push the PDU scraper image to GHCR.
#
# Triggers:
#   - push to main when files under devops/pdu_scraper/ (or this workflow) change
#   - manual workflow_dispatch (always builds)
#
# Image:
#   ghcr.io/knaeckebrothero/pdu-scraper
#
# Tags:
#   - sha-<short>   always
#   - latest        on push to main / dispatch from main

on:
  push:
    branches: [main]
    paths:
      - 'devops/pdu_scraper/**'
      - '.github/workflows/pdu-scraper.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: knaeckebrothero/pdu-scraper

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."docker.io"]
              mirrors = ["mirror.gcr.io"]

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./devops/pdu_scraper
          file: ./devops/pdu_scraper/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,ignore-error=true
          cache-to: type=gha,mode=min,ignore-error=true
