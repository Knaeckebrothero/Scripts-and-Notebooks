apiVersion: v1
kind: Secret
metadata:
  name: haccp-secrets
  namespace: haccp
type: Opaque
stringData:
  # PostgreSQL credentials
  POSTGRES_USER: "haccp"
  POSTGRES_PASSWORD: "<YOUR_DB_PASSWORD>"
  POSTGRES_DB: "haccp"
  # App database connection (matches postgres credentials)
  DATABASE_HOST: "haccp-postgres"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "haccp"
  DATABASE_USER: "haccp"
  DATABASE_PASSWORD: "<YOUR_DB_PASSWORD>"
  # Initial admin credentials (only used on first DB init)
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "<YOUR_ADMIN_PASSWORD>"
