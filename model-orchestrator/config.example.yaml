# AI Model Router Configuration
# OpenAI API-compatible gateway for deployed models
#
# Each route's exposed model ids are the union of:
#   1. its `models:` list (explicit aliases — the request payload's `model`
#      is rewritten to `backend_model_name` before forwarding), and
#   2. ids the backend reports via its own `/v1/models` (passthrough — the
#      payload's `model` is forwarded unchanged).
# Aliases win on collisions. Discovery refreshes every
# ROUTER_DISCOVERY_INTERVAL seconds (default 300). Backends without
# `/v1/models` (e.g. Kokoro, Whisper) only contribute their declared aliases.
# `/v1/models` responses pass upstream metadata (max_model_len, permission,
# created, root, parent, …) through verbatim when available.

# Server configuration
server:
  host: "0.0.0.0"
  port: 8090

# Rate limiting tiers
tiers:
  admin:
    requests_per_minute: 1000
    burst: 100
    priority: 1
    description: "Admin tier - high rate limit"
  standard:
    requests_per_minute: 100
    burst: 20
    description: "Standard production tier"
  unlimited:
    requests_per_minute: 999999
    burst: 10000
    priority: 0
    description: "Unlimited usage - no rate limiting"
  limited:
    requests_per_minute: 20
    burst: 5
    description: "Limited/development tier"

# API Keys with metadata
api_keys:
  - key: "sk-change-me-admin-key"
    owner: "admin"
    tier: "admin"
    enabled: true
    name: "Admin Key"
  - key: "sk-change-me-standard-key"
    owner: "engineering"
    tier: "standard"
    enabled: true
    name: "Production Standard Key"

# Model routing configuration
routes:
  # Embedding models
  - name: "Qwen3-Embedding-8B"
    type: "embedding"
    backend: "http://127.0.0.1:8081"
    endpoint: "/v1/embeddings"
    backend_model_name: "Qwen/Qwen3-Embedding-8B"
    models:
      - "qwen3-embedding-8b"
    owned_by: "qwen"

  - name: "Qwen3-Reranker-8B"
    type: "reranker"
    backend: "http://127.0.0.1:8082"
    endpoint: "/v1/rerank"
    backend_model_name: "Qwen/Qwen3-Reranker-8B"
    models:
      - "qwen3-reranker-8b"
    owned_by: "qwen"

  - name: "Qwen3-Embedding-0.6B"
    type: "embedding"
    backend: "http://127.0.0.1:8083"
    endpoint: "/v1/embeddings"
    backend_model_name: "Qwen/Qwen3-Embedding-0.6B"
    models:
      - "qwen3-embedding-0.6b"
    owned_by: "qwen"

  # Vision model
  - name: "Pixtral-12B-2409"
    type: "vision"
    backend: "http://127.0.0.1:8086"
    endpoint: "/v1/chat/completions"
    backend_model_name: "mistralai/Pixtral-12B-2409"
    models:
      - "pixtral-12b-2409"
      - "pixtral-12b"
    owned_by: "mistralai"

  # Chat model
  - name: "GPT-OSS-20B"
    type: "chat"
    backend: "http://127.0.0.1:8085"
    endpoint: "/v1/chat/completions"
    backend_model_name: "openai/gpt-oss-20b"
    models:
      - "gpt-oss-20b"
    owned_by: "openai"

  # Chat model with per-request defaults (Gemma 4 reasoning)
  # --------------------------------------------------------
  # `request_defaults` is shallow-merged into the outbound payload for this
  # route before forwarding; any value the client sends wins. Gemma 4 only
  # returns a separate `reasoning` field when the <|channel> delimiters survive
  # detokenization, which requires `skip_special_tokens: false` on every
  # request — and vLLM has no server-side default for that flag, so the gateway
  # injects it here. `enable_thinking` turns reasoning on (the container also
  # defaults this via --default-chat-template-kwargs; repeating it is harmless).
  # NOTE: reliable for non-streaming responses. vLLM's *streaming* reasoning
  # parser is still affected by upstream issue #38855, so streamed requests may
  # still surface the <|channel> markers inline in `content`.
  - name: "Gemma-4-26B-A4B"
    type: "chat"
    backend: "http://127.0.0.1:8000"
    endpoint: "/v1/chat/completions"
    backend_model_name: "google/gemma-4-26B-A4B-it"
    models:
      - "gemma-4-26b-a4b"
      - "gemma-4-moe"
    owned_by: "google"
    request_defaults:
      skip_special_tokens: false
      chat_template_kwargs:
        enable_thinking: true

  # Speech-to-text
  # `health_path: null` disables /health probing for this backend — the
  # default Whisper server image doesn't expose /health, so the router's
  # own /health endpoint would falsely report "unavailable". Any route may
  # opt out the same way; omit the field to use the default '/health', or
  # set it to another path if the backend exposes health on a custom URL.
  - name: "Whisper-large-v3-turbo"
    type: "stt"
    backend: "http://127.0.0.1:8087"
    endpoint: "/v1/audio/transcriptions"
    backend_model_name: "whisper-large-v3-turbo"
    health_path: null
    models:
      - "whisper-large-v3-turbo"
      - "whisper-large-v3"
      - "whisper-1"
    owned_by: "openai"

  # Text-to-speech — Kokoro also doesn't expose /health.
  # The router additionally serves `GET /v1/audio/voices` for tts routes,
  # forwarding to this backend's own voice listing (a kokoro-fastapi
  # extension; open, no auth — like `/v1/models`). With one tts route it
  # needs no args; clients with several can pass `?model=<alias>` to pick one.
  - name: "Kokoro-82M"
    type: "tts"
    backend: "http://127.0.0.1:8880"
    endpoint: "/v1/audio/speech"
    backend_model_name: "kokoro-82m"
    health_path: null
    models:
      - "kokoro-82M"
      - "kokoro"
      - "tts-1"
    owned_by: "remsem"

  # Example: load-balanced pool of backends
  # ---------------------------------------
  # `backend:` accepts either a single URL (shown above) or a list of URLs.
  # With a list, the router round-robins requests across the pool. A backend
  # that returns a 5xx or fails to connect is flagged unhealthy for
  # ROUTER_UNHEALTHY_SECONDS (default 30s) and skipped during selection;
  # non-streaming requests also get one retry against a different backend
  # on the same failure. Streaming requests pick one backend with no retry.
  #
  # - name: "Chat-Pool"
  #   type: "chat"
  #   backend:
  #     - "http://llm-1.internal:8000"
  #     - "http://llm-2.internal:8000"
  #   endpoint: "/v1/chat/completions"
  #   backend_model_name: "openai/gpt-oss-20b"
  #   models:
  #     - "chat-pool"
  #   owned_by: "openai"

  # Example: route a backend through the VPN sidecar
  # ------------------------------------------------
  # Any route may set an optional `proxy:` field. When set, the router dials
  # the backend through that proxy. Supported schemes:
  #   - socks5h://host:port   (preferred — remote DNS resolution via the tunnel)
  #   - socks5://host:port    (DNS resolved locally)
  #   - http://host:port
  #
  # Deploy the vpn-sidecar Quadlet unit (see deployment/vpn-sidecar.container)
  # and uncomment this block to expose an internal endpoint that only exists
  # inside the VPN:
  #
  # - name: "Internal-LLM"
  #   type: "chat"
  #   backend: "http://llm-internal.corp.example:8000"
  #   endpoint: "/v1/chat/completions"
  #   backend_model_name: "internal-llm"
  #   proxy: "socks5h://127.0.0.1:1080"
  #   models:
  #     - "internal-llm"
  #   owned_by: "internal"

  # Example: backend that requires its own API key
  # ------------------------------------------------
  # If the upstream endpoint authenticates requests (e.g. a hosted
  # third-party provider), point `backend_api_key_env` at an env var
  # holding the key. The router will inject `Authorization: Bearer <key>`
  # on outbound requests to this route only. The key is read once at
  # startup; if the env var is unset the route still loads but logs a
  # warning and sends requests without Authorization.
  #
  # - name: "Hosted-LLM"
  #   type: "chat"
  #   backend: "https://api.hosted-llm.example"
  #   endpoint: "/v1/chat/completions"
  #   backend_model_name: "hosted-llm-large"
  #   backend_api_key_env: "HOSTED_LLM_API_KEY"
  #   models:
  #     - "hosted-llm"
  #   owned_by: "hosted"

  # Example: backends across TWO distinct VPN networks
  # --------------------------------------------------
  # Deploy a second sidecar (deployment/vpn-sidecar-b.container on Quadlet,
  # or a second container in the k8s pod) listening on a different SOCKS
  # port. Each route points at the tunnel it belongs to:
  #
  # - name: "Internal-LLM-Net-A"
  #   type: "chat"
  #   backend: "http://llm.corp-a.example:8000"
  #   endpoint: "/v1/chat/completions"
  #   backend_model_name: "internal-llm-a"
  #   proxy: "socks5h://127.0.0.1:1080"
  #   models:
  #     - "internal-llm-a"
  #   owned_by: "corp-a"
  #
  # - name: "Internal-LLM-Net-B"
  #   type: "chat"
  #   backend: "http://llm.corp-b.example:8000"
  #   endpoint: "/v1/chat/completions"
  #   backend_model_name: "internal-llm-b"
  #   proxy: "socks5h://127.0.0.1:1081"
  #   models:
  #     - "internal-llm-b"
  #   owned_by: "corp-b"

# Legacy rate limit config (deprecated - use tiers above)
rate_limit:
  enabled: false
  requests_per_minute: 100
  burst: 20
