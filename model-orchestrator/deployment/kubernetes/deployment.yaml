apiVersion: apps/v1
kind: Deployment
metadata:
  name: model-orchestrator
  namespace: model-orchestrator
  labels:
    app.kubernetes.io/name: model-orchestrator
spec:
  # Pinned to 1: the rate limiter is in-memory, so >1 replica gives per-pod
  # counters (effectively multiplying configured RPM by replica count).
  # Revisit once a shared store lands (see roadmap.md).
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: model-orchestrator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: model-orchestrator
    spec:
      containers:
        - name: router
          image: ghcr.io/knaeckebrothero/model-orchestrator:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: ROUTER_PORT
              value: "8090"
            - name: ROUTER_CONFIG
              value: "/app/config.yaml"
            # API keys + usage live in Postgres (required). Point this at a
            # reachable instance; the router creates its own tables.
            - name: ROUTER_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: model-orchestrator-keys
                  key: database-url
          ports:
            - name: http
              containerPort: 8090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"

        # VPN sidecar — remove this container (and the /dev/ppp volume) if
        # you don't have any routes that set `proxy: socks5h://...`.
        # Shares the pod's network namespace with the router, so the router
        # dials socks5h://127.0.0.1:1080.
        - name: vpn-sidecar
          image: ghcr.io/knaeckebrothero/vpn-sidecar:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: model-orchestrator-vpn
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          volumeMounts:
            - name: dev-ppp
              mountPath: /dev/ppp
          # Liveness probe catches stale tunnels that openfortivpn itself fails
          # to notice. /healthz compares ppp0 tx/rx deltas between probes — if
          # we sent bytes in and got nothing back, it returns 503 and the
          # kubelet restarts the container. See devops/vpn-sidecar/healthcheck.sh.
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

        # Second VPN sidecar — uncomment when you need backends from a
        # distinct VPN network. Must listen on a different loopback port
        # (set SOCKS_PORT=1081 inside model-orchestrator-vpn-b); routes
        # then reference it via `proxy: socks5h://127.0.0.1:1081`.
        #
        # - name: vpn-sidecar-b
        #   image: ghcr.io/knaeckebrothero/vpn-sidecar:latest
        #   imagePullPolicy: IfNotPresent
        #   envFrom:
        #     - secretRef:
        #         name: model-orchestrator-vpn-b
        #   securityContext:
        #     capabilities:
        #       add: ["NET_ADMIN"]
        #   volumeMounts:
        #     - name: dev-ppp
        #       mountPath: /dev/ppp
        #   # Must use a distinct HEALTH_PORT (e.g. 8082) in model-orchestrator-vpn-b
        #   # since both sidecars share the pod network namespace.
        #   livenessProbe:
        #     httpGet:
        #       path: /healthz
        #       port: 8082
        #     initialDelaySeconds: 30
        #     periodSeconds: 20
        #     timeoutSeconds: 5
        #     failureThreshold: 3
        #   resources:
        #     requests:
        #       cpu: "50m"
        #       memory: "64Mi"
        #     limits:
        #       cpu: "500m"
        #       memory: "256Mi"

      volumes:
        - name: config
          configMap:
            name: model-orchestrator-config
        - name: dev-ppp
          hostPath:
            path: /dev/ppp
            type: CharDevice

      terminationGracePeriodSeconds: 30
