apiVersion: v1
kind: ConfigMap
metadata:
  name: model-orchestrator-config
  namespace: model-orchestrator
  labels:
    app.kubernetes.io/name: model-orchestrator
data:
  # Non-secret router configuration: server + routes only. API keys (with
  # their per-key rate limits / allowlists / expiry) live in Postgres — the
  # connection string comes from the Secret (see secret.yaml.example).
  #
  # Replace the sample route below with your real config. Full schema
  # reference: ../../config.example.yaml
  config.yaml: |
    server:
      host: "0.0.0.0"
      port: 8090

    routes:
      # Example: a chat backend running as a Service in the same namespace.
      # Replace with your actual backends (LLM, embedding, rerank, STT, TTS, ...).
      - name: "example-chat"
        type: "chat"
        backend: "http://llama-server:80"
        endpoint: "/v1/chat/completions"
        backend_model_name: "openai/gpt-oss-20b"
        models:
          - "gpt-oss-20b"
        owned_by: "openai"

      # Example: a backend reachable only through the VPN sidecar (same pod,
      # shared localhost). Requires the vpn sidecar container in deployment.yaml.
      # - name: "internal-llm"
      #   type: "chat"
      #   backend: "http://llm-internal.corp.example:8000"
      #   endpoint: "/v1/chat/completions"
      #   backend_model_name: "internal-llm"
      #   proxy: "socks5h://127.0.0.1:1080"
      #   models:
      #     - "internal-llm"
      #   owned_by: "internal"
